<!DOCTYPE html>
<html>
<head>
<title>房东系统 Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial;padding:20px}
.card{border:1px solid #ddd;padding:10px;margin:10px 0}
button{margin:3px}
</style>
</head>

<body>

<h2>🏠 房东管理系统 Pro</h2>

<input id="houseName" placeholder="房名">
<button onclick="addHouse()">➕ Add House</button>

<div id="houses"></div>

<canvas id="chart" height="100"></canvas>

<script>
let houses = JSON.parse(localStorage.getItem("houses")||"{}");

/* ------------------ 房源 ------------------ */
function addHouse(){
  let name = document.getElementById("houseName").value;
  if(!name) return;

  houses[name] = {
    rent: [],
    expenses: [],
    type: "whole"
  };

  save();
  render();
}

/* ------------------ rent ------------------ */
function addRent(h){
  let amount = prompt("Rent amount");
  let date = prompt("Date (YYYY-MM-DD)", new Date().toISOString().slice(0,10));

  houses[h].rent.push({
    amount: parseFloat(amount),
    date,
    status: "unpaid"
  });

  save();
  render();
}

/* ------------------ expense ------------------ */
function addExpense(h){
  let desc = prompt("Description");
  let amount = prompt("Amount");

  houses[h].expenses.push({
    desc,
    amount: parseFloat(amount),
    date: new Date().toISOString().slice(0,10)
  });

  save();
  render();
}

/* ------------------ edit/delete expense ------------------ */
function editExpense(h,i){
  let e = houses[h].expenses[i];
  let a = prompt("1 Edit / 2 Delete");

  if(a=="1"){
    e.desc = prompt("desc",e.desc);
    e.amount = parseFloat(prompt("amount",e.amount));
  }
  if(a=="2"){
    houses[h].expenses.splice(i,1);
  }

  save();
  render();
}

/* ------------------ rent status ------------------ */
function markPaid(h,i){
  houses[h].rent[i].status="paid";
  save();
  render();
}

/* ------------------ delete house ------------------ */
function deleteHouse(h){
  delete houses[h];
  save();
  render();
}

/* ------------------ profit ------------------ */
function calc(h){
  let r = houses[h].rent.reduce((a,b)=>a+(b.amount||0),0);
  let e = houses[h].expenses.reduce((a,b)=>a+(b.amount||0),0);
  return r-e;
}

/* ------------------ render ------------------ */
function render(){
  let div = document.getElementById("houses");
  div.innerHTML="";

  Object.keys(houses).forEach(h=>{

    let house = houses[h];

    let rentHTML = house.rent.map((r,i)=>
      `💰 RM${r.amount} - ${r.date} - ${r.status}
      <button onclick="markPaid('${h}',${i})">✔</button>`
    ).join("<br>");

    let expHTML = house.expenses.map((e,i)=>
      `💸 ${e.desc} RM${e.amount} (${e.date})
      <button onclick="editExpense('${h}',${i})">✏</button>`
    ).join("<br>");

    div.innerHTML += `
    <div class="card">
      <h3>${h}</h3>

      <b>Rent</b><br>${rentHTML || "No rent"}<br>
      <button onclick="addRent('${h}')">+ Rent</button>

      <br><br>

      <b>Expenses</b><br>${expHTML || "No expense"}<br>
      <button onclick="addExpense('${h}')">+ Expense</button>

      <br><br>

      💹 Profit: RM ${calc(h)}

      <br><br>

      <button onclick="deleteHouse('${h}')">🗑 Delete House</button>
    </div>
    `;
  });

  drawChart();
}

/* ------------------ chart ------------------ */
function drawChart(){
  let labels = Object.keys(houses);
  let data = labels.map(h=>calc(h));

  new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{
      labels,
      datasets:[{data}]
    }
  });
}

/* ------------------ save ------------------ */
function save(){
  localStorage.setItem("houses",JSON.stringify(houses));
}

/* ------------------ auto monthly reset (demo) ------------------ */
setInterval(()=>{
  let d = new Date();
  if(d.getDate()==1){
    console.log("Monthly reset trigger (demo)");
  }
}, 86400000);

render();
</script>

</body>
</html>
