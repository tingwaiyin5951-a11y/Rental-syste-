<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rental Manager Pro</title>

<style>
body { font-family: Arial; padding: 10px; }

.house { margin-bottom: 20px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }

.room {
  display: inline-block;
  padding: 12px;
  margin: 5px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  white-space: pre-line;
}

.available { background: green; }
.paid { background: blue; }
.late { background: red; }

button { padding: 8px; margin: 5px; }

.report {
  background: #f5f5f5;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
}
</style>
</head>

<body>

<h2>🏠 Rental Manager PRO</h2>

<button onclick="addHouse()">➕ Add House</button>

<div id="summary" class="report"></div>
<div id="analysis" class="report"></div>

<div id="app"></div>

<script>

let houses = JSON.parse(localStorage.getItem("houses")) || {};
let contracts = JSON.parse(localStorage.getItem("contracts")) || {};

function save() {
  localStorage.setItem("houses", JSON.stringify(houses));
  localStorage.setItem("contracts", JSON.stringify(contracts));
}

function isLate(t) {
  if (!t.due || t.paid) return false;
  let today = new Date().getDate();
  return today > t.due;
}

function addHouse() {
  let name = prompt("House name:");
  let type = prompt("1 = Rooms\n2 = Whole Unit");

  if (!name) return;

  if (type == "1") {
    let rooms = prompt("Number of rooms:");
    houses[name] = {
      type: "room",
      data: Array(parseInt(rooms)).fill({})
    };
  } else {
    houses[name] = {
      type: "whole",
      data: {}
    };
  }

  save();
  render();
}

function deleteHouse(name) {
  if (confirm("Delete " + name + "?")) {
    delete houses[name];
    delete contracts[name];
    save();
    render();
  }
}

function render() {
  let app = document.getElementById("app");
  let summary = document.getElementById("summary");
  let analysis = document.getElementById("analysis");

  app.innerHTML = "";
  summary.innerHTML = "";
  analysis.innerHTML = "";

  let total = 0;

  let roomIncome = 0;
  let wholeIncome = 0;

  for (let h in houses) {

    let house = houses[h];

    let div = document.createElement("div");
    div.className = "house";

    let title = document.createElement("h3");
    title.innerText = h + " ❌";
    title.onclick = () => deleteHouse(h);
    div.appendChild(title);

    // 📑 CONTRACT INFO
    let c = contracts[h] || {};
    let contractText = document.createElement("div");
    contractText.innerHTML =
      "📑 Start: " + (c.start || "-") +
      "<br>📅 End: " + (c.end || "-");

    div.appendChild(contractText);

    // 🏠 ROOM MODE
    if (house.type == "room") {

      house.data.forEach((r, i) => {

        let btn = document.createElement("div");

        if (!r.rent) {
          btn.className = "room available";
          btn.innerText = "Room " + (i+1);
        } else {
          let late = isLate(r);
          btn.className = "room " + (late ? "late" : "paid");

          btn.innerText =
            "Room " + (i+1) +
            "\n👤 " + r.name +
            "\n💰 RM" + r.rent +
            "\n📅 " + r.due +
            (r.paid ? "\n✅" : (late ? "\n⚠️ LATE" : "\n⏳"));

          if (r.paid) roomIncome += r.rent;
        }

        btn.onclick = () => {

          if (!r.rent) {
            let name = prompt("Tenant name:");
            let rent = prompt("Rent:");
            let due = prompt("Due day:");

            if (name && rent && due) {
              house.data[i] = {
                name, rent: parseFloat(rent),
                due: parseInt(due),
                paid: false
              };

              let start = new Date().toLocaleDateString();
              contracts[h] = {
                start: start,
                end: "Active"
              };
            }
          } else {
            let a = prompt("1=Paid\n2=Unpaid\n3=Remove");

            if (a == "1") r.paid = true;
            if (a == "2") r.paid = false;
            if (a == "3") house.data[i] = {};
          }

          save();
          render();
        };

        div.appendChild(btn);
      });
    }

    // 🏠 WHOLE UNIT
    else {

      let t = house.data;
      let btn = document.createElement("div");

      if (!t.rent) {
        btn.className = "room available";
        btn.innerText = "Whole Unit";
      } else {

        let late = isLate(t);
        btn.className = "room " + (late ? "late" : "paid");

        btn.innerText =
          "Whole Unit" +
          "\n👤 " + t.name +
          "\n💰 RM" + t.rent +
          "\n📅 " + t.due +
          (t.paid ? "\n✅" : (late ? "\n⚠️ LATE" : "\n⏳"));

        if (t.paid) wholeIncome += t.rent;
      }

      btn.onclick = () => {

        if (!t.rent) {
          let name = prompt("Tenant:");
          let rent = prompt("Rent:");
          let due = prompt("Due day:");

          if (name && rent && due) {
            house.data = {
              name, rent: parseFloat(rent),
              due: parseInt(due),
              paid: false
            };

            contracts[h] = {
              start: new Date().toLocaleDateString(),
              end: "Active"
            };
          }
        } else {
          let a = prompt("1=Paid\n2=Unpaid\n3=Remove");

          if (a == "1") t.paid = true;
          if (a == "2") t.paid = false;
          if (a == "3") house.data = {};
        }

        save();
        render();
      };

      div.appendChild(btn);
    }

    app.appendChild(div);
  }

  // 📊 SUMMARY
  summary.innerHTML =
    "📊 Room Income: RM" + roomIncome +
    "<br>🏠 Whole Unit Income: RM" + wholeIncome +
    "<br>💰 Total: RM" + (roomIncome + wholeIncome);

  // ⚖️ ANALYSIS
  if (roomIncome > wholeIncome) {
    analysis.innerHTML = "📈 分房更赚钱";
  } else if (wholeIncome > roomIncome) {
    analysis.innerHTML = "📈 整租更赚钱";
  } else {
    analysis.innerHTML = "⚖️ 两者差不多";
  }
}

render();

</script>

</body>
</html>
