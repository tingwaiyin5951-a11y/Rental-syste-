<!DOCTYPE html>
<html>
<head>
<title>房东管理系统</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial;padding:20px}
.card{border:1px solid #ddd;padding:10px;margin:10px 0}
button{margin:3px}
</style>
</head>

<body>

<h2>🏠 房东管理系统</h2>

<input id="houseName" placeholder="房名">
<button onclick="addHouse()">➕ Add House</button>

<div id="houses"></div>

<canvas id="chart" height="100"></canvas>

<script>

let houses = JSON.parse(localStorage.getItem("houses") || "{}");

/* ---------------- 房源 ---------------- */
function addHouse(){
  let name = document.getElementById("houseName").value;
  if(!name) return;

  if(!houses[name]){
    houses[name] = {
      rent: [],
      expenses: []
    };
  }

  save();
  render();
}

/* ---------------- rent ---------------- */
function addRent(h){
  let amount = prompt("Rent amount");
  if(!amount) return;

  let date = prompt("Date", new Date().toISOString().slice(0,10));

  houses[h].rent.push({
    amount: parseFloat(amount),
    date,
    status: "unpaid"
  });

  save();
  render();
}

function markPaid(h,i){
  houses[h].rent[i].status = "paid";
  save();
  render();
}

/* ---------------- expense ---------------- */
function addExpense(h){
  let desc = prompt("Description");
  if(!desc) return;

  let amount = prompt("Amount");
  if(!amount) return;

  houses[h].expenses.push({
    desc,
    amount: parseFloat(amount),
    date: new Date().toISOString().slice(0,10)
  });

  save();
  render();
}

/* ✏️ edit expense */
function editExpense(houseName,index){
  let e = houses[houseName].expenses[index];

  let desc = prompt("Description", e.desc);
  let amount = prompt("Amount", e.amount);

  if(desc !== null && amount !== null){
    houses[houseName].expenses[index] = {
      desc,
      amount: parseFloat(amount),
      date: e.date
    };

    save();
    render();
  }
}

/* 🗑 delete expense */
function deleteExpense(houseName,index){
  if(confirm("Delete this expense?")){
    houses[houseName].expenses.splice(index,1);
    save();
    render();
  }
}

/* ---------------- delete house ---------------- */
function deleteHouse(h){
  if(confirm("Delete this house?")){
    delete houses[h];
    save();
    render();
  }
}

/* ---------------- profit ---------------- */
function calc(h){
  let r = houses[h].rent.reduce((a,b)=>a+(b.amount||0),0);
  let e = houses[h].expenses.reduce((a,b)=>a+(b.amount||0),0);
  return r - e;
}

/* ---------------- render ---------------- */
function render(){
  let div = document.getElementById("houses");
  div.innerHTML = "";

  Object.keys(houses).forEach(h=>{

    let house = houses[h];

    let rentHTML = house.rent.map((r,i)=>
      `💰 RM${r.amount} - ${r.date} - ${r.status}
      <button onclick="markPaid('${h}',${i})">✔</button>`
    ).join("<br>");

    let expHTML = house.expenses.map((e,i)=>
      `💸 ${e.desc} RM${e.amount} (${e.date})
      <button onclick="editExpense('${h}',${i})">✏️</button>
      <button onclick="deleteExpense('${h}',${i})">🗑</button>`
    ).join("<br>");

    div.innerHTML += `
    <div class="card">
      <h3>${h}</h3>

      <b>Rent</b><br>
      ${rentHTML || "No rent"}
      <br>
      <button onclick="addRent('${h}')">+ Rent</button>

      <br><br>

      <b>Expenses</b><br>
      ${expHTML || "No expense"}
      <br>
      <button onclick="addExpense('${h}')">+ Expense</button>

      <br><br>

      💹 Profit: RM ${calc(h)}

      <br><br>

      <button onclick="deleteHouse('${h}')">🗑 Delete House</button>
    </div>
    `;
  });

  drawChart();
}

/* ---------------- chart ---------------- */
function drawChart(){
  let labels = Object.keys(houses);
  let data = labels.map(h=>calc(h));

  new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{
      labels,
      datasets:[{data}]
    }
  });
}

/* ---------------- save ---------------- */
function save(){
  localStorage.setItem("houses", JSON.stringify(houses));
}

render();

</script>

</body>
</html>
