<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rental Manager</title>
<link rel="manifest" href="manifest.json">

<style>
body { font-family: Arial; padding: 10px; }
.house { margin-bottom: 20px; }
.room {
  display: inline-block;
  padding: 15px;
  margin: 5px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  white-space: pre-line;
}
.available { background: green; }
.paid { background: blue; }
.late { background: red; }
button { padding: 10px; margin: 5px; }
</style>
</head>

<body>

<h2>🏠 Rental Manager</h2>

<button onclick="addHouse()">➕ Add House</button>

<h3 id="total">💰 Total: RM0</h3>
<div id="report"></div>

<div id="app"></div>

<script>

let houses = JSON.parse(localStorage.getItem("houses")) || {};
let lastReset = localStorage.getItem("lastReset");

function save() {
  localStorage.setItem("houses", JSON.stringify(houses));
}

function isLate(room) {
  if (!room.due || room.paid) return false;
  let today = new Date().getDate();
  return today > room.due;
}

function monthlyReset() {
  let now = new Date();
  let month = now.getMonth();

  if (lastReset != month) {
    for (let house in houses) {
      houses[house].forEach(room => {
        if (room.rent) {
          room.paid = false;
        }
      });
    }
    localStorage.setItem("lastReset", month);
    save();
  }
}

function addHouse() {
  let name = prompt("House name:");
  let rooms = prompt("Number of rooms:");

  if (name && rooms) {
    houses[name] = Array(parseInt(rooms)).fill({});
    save();
    render();
  }
}

function deleteHouse(name) {
  if (confirm("Delete " + name + "?")) {
    delete houses[name];
    save();
    render();
  }
}

function render() {
  monthlyReset(); // 🔥 自动每月reset

  let app = document.getElementById("app");
  let report = document.getElementById("report");

  app.innerHTML = "";
  report.innerHTML = "";

  let total = 0;
  let houseIncome = {};

  for (let house in houses) {
    let div = document.createElement("div");
    div.className = "house";

    let title = document.createElement("h3");
    title.innerText = house + " ❌";
    title.onclick = () => deleteHouse(house);
    div.appendChild(title);

    let houseTotal = 0;

    houses[house].forEach((room, i) => {
      let btn = document.createElement("div");
      let occupied = room.rent > 0;

      if (!occupied) {
        btn.className = "room available";
        btn.innerText = "Room " + (i+1);
      } else {
        let late = isLate(room);
        btn.className = "room " + (late ? "late" : "paid");

        btn.innerText =
          "Room " + (i+1) +
          "\\n👤 " + room.name +
          "\\n💰 RM" + room.rent +
          "\\n📅 " + room.due +
          (room.paid ? "\\n✅" : (late ? "\\n⚠️ LATE" : "\\n⏳"));

        total += room.rent;
        houseTotal += room.rent;
      }

      btn.onclick = () => {
        if (!occupied) {
          let name = prompt("Tenant name:");
          let rent = prompt("Rent (RM):");
          let due = prompt("Due day:");

          if (name && rent && due) {
            houses[house][i] = {
              name: name,
              rent: parseFloat(rent),
              due: parseInt(due),
              paid: false
            };
          }
        } else {
          let action = prompt("1=Paid\\n2=Unpaid\\n3=Remove");

          if (action == "1") room.paid = true;
          if (action == "2") room.paid = false;
          if (action == "3") houses[house][i] = {};
        }

        save();
        render();
      };

      div.appendChild(btn);
    });

    houseIncome[house] = houseTotal;
    app.appendChild(div);
  }

  // 📊 收入分析
  let topHouse = "";
  let max = 0;

  for (let h in houseIncome) {
    report.innerHTML += h + ": RM" + houseIncome[h] + "<br>";
    if (houseIncome[h] > max) {
      max = houseIncome[h];
      topHouse = h;
    }
  }

  if (topHouse) {
    report.innerHTML += "<br>🔥 Top: " + topHouse;
  }

  document.getElementById("total").innerText = "💰 Total: RM" + total;
}

render();

</script>

</body>
</html>
