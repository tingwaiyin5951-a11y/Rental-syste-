<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rental Manager Pro</title>

<style>
body { font-family: Arial; padding: 10px; }

.house {
  margin-bottom: 20px;
  border-bottom: 1px solid #ddd;
  padding-bottom: 10px;
}

.room {
  display:inline-block;
  padding:10px;
  margin:5px;
  border-radius:8px;
  color:white;
  cursor:pointer;
  white-space: pre-line;
}

.available { background:green; }
.paid { background:blue; }
.late { background:red; }

button {
  padding:6px;
  margin:4px;
}
.report {
  background:#f4f4f4;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}
</style>
</head>

<body>

<h2>🏠 Rental Manager PRO</h2>

<button onclick="addHouse()">➕ Add House</button>

<div id="summary" class="report"></div>

<div id="app"></div>

<script>

let houses = JSON.parse(localStorage.getItem("houses") || "{}");

function save(){
  localStorage.setItem("houses", JSON.stringify(houses));
}

function addHouse(){
  let name = prompt("House name");
  let type = prompt("1 = Rooms / 2 = Whole Unit");

  if(!name) return;

  if(type == "1"){
    let n = prompt("Number of rooms");

    houses[name] = {
      type:"room",
      data: Array(parseInt(n)).fill({}),
      expenses:[]
    };

  } else {
    houses[name] = {
      type:"whole",
      data:{},
      expenses:[]
    };
  }

  save();
  render();
}

function deleteHouse(name){
  if(confirm("Delete " + name + "?")){
    delete houses[name];
    save();
    render();
  }
}

function isLate(t){
  if(!t || !t.due || t.paid) return false;
  let today = new Date().getDate();
  return today > t.due;
}

function render(){

  let app = document.getElementById("app");
  let summary = document.getElementById("summary");

  app.innerHTML = "";
  summary.innerHTML = "";

  let totalIncome = 0;
  let totalExpense = 0;
  let roomIncome = 0;
  let wholeIncome = 0;

  for(let h in houses){

    let house = houses[h];

    let div = document.createElement("div");
    div.className = "house";

    let title = document.createElement("h3");
    title.innerText = h + " ❌";
    title.onclick = () => deleteHouse(h);
    div.appendChild(title);

    // ➕ EXPENSE BUTTON
    let expBtn = document.createElement("button");
    expBtn.innerText = "➕ Add Expense";
    expBtn.onclick = () => {

      let desc = prompt("Expense description");
      let amount = prompt("Amount RM");

      if(!house.expenses) house.expenses = [];

      if(desc && amount){
        house.expenses.push({
          desc,
          amount: parseFloat(amount),
          date: new Date().toLocaleDateString()
        });

        save();
        render();
      }
    };

    div.appendChild(expBtn);

    // 💸 SHOW EXPENSES
    let expTotal = 0;

    if(house.expenses && house.expenses.length){

      let expBox = document.createElement("div");
      expBox.innerHTML = "<b>💸 Expenses:</b><br>";

      house.expenses.forEach(e=>{
        expTotal += e.amount;
        expBox.innerHTML +=
          "• " + e.desc + " - RM" + e.amount +
          " (" + e.date + ")<br>";
      });

      expBox.innerHTML += "<b>Total: RM" + expTotal + "</b>";
      div.appendChild(expBox);
    }

    totalExpense += expTotal;

    // 🏠 ROOM MODE
    if(house.type == "room"){

      house.data.forEach((r,i)=>{

        let btn = document.createElement("div");

        if(!r.rent){
          btn.className = "room available";
          btn.innerText = "Room " + (i+1);
        } else {

          let late = isLate(r);
          btn.className = "room " + (late ? "late":"paid");

          btn.innerText =
            "👤 " + r.name +
            "\n📞 " + r.phone +
            "\n💰 RM" + r.rent +
            "\n📅 Start: " + r.start +
            "\n📆 Due: " + r.due +
            (r.paid ? "\n✅ Paid" : "\n⏳ Unpaid");

          if(r.paid) roomIncome += r.rent;
        }

        btn.onclick = ()=>{

          if(!r.rent){

            let name = prompt("Tenant name");
            let phone = prompt("Phone");
            let rent = prompt("Rent");
            let start = prompt("Start date");
            let due = prompt("Due day");

            if(name && phone && rent && due){

              house.data[i] = {
                name,
                phone,
                rent: parseFloat(rent),
                start,
                due: parseInt(due),
                paid:false
              };
            }

          } else {

            let a = prompt("1=Paid\n2=Unpaid\n3=Remove");

            if(a=="1") r.paid=true;
            if(a=="2") r.paid=false;
            if(a=="3") house.data[i]={};
          }

          save();
          render();
        };

        div.appendChild(btn);
      });

    }

    // 🏠 WHOLE UNIT
    else{

      let t = house.data;

      let btn = document.createElement("div");

      if(!t.rent){
        btn.className = "room available";
        btn.innerText = "Whole Unit";
      } else {

        let late = isLate(t);
        btn.className = "room " + (late ? "late":"paid");

        btn.innerText =
          "👤 " + t.name +
          "\n📞 " + t.phone +
          "\n💰 RM" + t.rent +
          "\n📅 Start: " + t.start +
          "\n📆 Due: " + t.due +
          (t.paid ? "\n✅ Paid" : "\n⏳ Unpaid");

        if(t.paid) wholeIncome += t.rent;
      }

      btn.onclick = ()=>{

        if(!t.rent){

          let name = prompt("Tenant");
          let phone = prompt("Phone");
          let rent = prompt("Rent");
          let start = prompt("Start date");
          let due = prompt("Due day");

          if(name && phone && rent && due){

            house.data = {
              name,
              phone,
              rent: parseFloat(rent),
              start,
              due: parseInt(due),
              paid:false
            };
          }

        } else {

          let a = prompt("1=Paid\n2=Unpaid\n3=Remove");

          if(a=="1") t.paid=true;
          if(a=="2") t.paid=false;
          if(a=="3") house.data={};
        }

        save();
        render();
      };

      div.appendChild(btn);
    }

    app.appendChild(div);
  }

  totalIncome = roomIncome + wholeIncome;

  let profit = totalIncome - totalExpense;

  summary.innerHTML =
    "📊 Income: RM" + totalIncome +
    "<br>💸 Expense: RM" + totalExpense +
    "<br>📈 Profit: RM" + profit +
    "<br><br>🏠 Room Income: RM" + roomIncome +
    "<br>🏠 Whole Income: RM" + wholeIncome;

}

render();

</script>

</body>
</html>
